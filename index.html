<!DOCTYPE html>
<html>
<head>
  <title>Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

  <h2>Scan Meter</h2>
  <div id="reader" style="width:300px;"></div>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbx3x8d_yDQSiI0Po56ZeQ5Ocm0ao2ZCMTZk8Qd15k3_73WtaC8wock_HtkeEpy4Q9ZgRg/exec";

    function onScanSuccess(decodedText) {
      fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify({ code: decodedText }),
      });

      alert("Saved: " + decodedText);
    }

    const html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );
  </script>

</body>
</html>
