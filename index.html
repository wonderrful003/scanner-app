<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Scann App</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c10; --surface: #12151c; --border: #1e2330;
      --accent: #00e5a0; --accent2: #0077ff; --warn: #ff4c4c;
      --text: #e8eaf0; --muted: #5a6275; --radius: 16px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px; opacity: 0.4; pointer-events: none; z-index: 0;
    }
    .app { position: relative; z-index: 1; max-width: 420px; margin: 0 auto; min-height: 100vh; padding: 24px 16px 40px; display: flex; flex-direction: column; gap: 20px; }

    header { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
    .logo { font-family: 'Space Mono', monospace; font-size: 1.1rem; font-weight: 700; letter-spacing: 0.08em; color: var(--accent); text-transform: uppercase; }
    .logo span { color: var(--text); }
    .pill { display: flex; align-items: center; gap: 6px; font-size: 0.7rem; font-family: 'Space Mono', monospace; color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 5px 12px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .card-head { padding: 14px 18px; border-bottom: 1px solid var(--border); font-size: 0.72rem; font-family: 'Space Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

    .preview-wrap { width: 100%; background: #000; min-height: 180px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    #preview { width: 100%; max-height: 260px; object-fit: contain; display: none; }
    .preview-placeholder { display: flex; flex-direction: column; align-items: center; gap: 10px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.75rem; padding: 36px 20px; text-align: center; }
    .preview-placeholder svg { opacity: 0.3; }

    /* Crop indicator overlay — shows which part will be read */
    .crop-hint { position: absolute; bottom: 0; left: 0; right: 0; height: 45%; border-top: 2px dashed var(--accent); pointer-events: none; display: none; }
    .crop-hint-label { position: absolute; top: -20px; left: 10px; font-size: 0.6rem; font-family: 'Space Mono', monospace; color: var(--accent); background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px; }
    #preview.loaded ~ .crop-hint { display: block; }

    .progress-wrap { height: 3px; background: var(--border); display: none; }
    .progress-bar { height: 100%; background: var(--accent2); width: 0%; transition: width 0.4s; }

    .status-bar { padding: 12px 18px; font-size: 0.75rem; font-family: 'Space Mono', monospace; color: var(--muted); display: flex; align-items: center; gap: 8px; border-top: 1px solid var(--border); min-height: 44px; }
    .status-bar.active { color: var(--accent2); }
    .status-bar.ok     { color: var(--accent); }
    .status-bar.bad    { color: var(--warn); }
    .spinner { width: 13px; height: 13px; border: 2px solid var(--border); border-top-color: var(--accent2); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to{transform:rotate(360deg)} }

    .btn-row { padding: 14px 18px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
    .btn-photo { flex: 1; padding: 13px; border: none; border-radius: 10px; font-family: 'Space Mono', monospace; font-size: 0.82rem; font-weight: 700; letter-spacing: 0.05em; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
    .btn-photo:active { transform: scale(0.97); }
    .btn-photo:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-take { background: var(--accent2); color: #fff; }
    .btn-ocr  { background: var(--accent);  color: #0a0c10; }

    #fileCamera { display: none; }

    .result-card { background: var(--surface); border: 2px solid var(--accent); border-radius: var(--radius); overflow: hidden; display: none; }
    .result-card.show { display: block; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:none} }
    .result-head { padding: 12px 18px; background: rgba(0,229,160,0.07); border-bottom: 1px solid var(--border); font-size: 0.7rem; font-family: 'Space Mono', monospace; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; }
    .result-text { padding: 16px 18px 4px; font-family: 'Space Mono', monospace; font-size: 1.5rem; font-weight: 700; color: var(--accent); word-break: break-all; line-height: 1.3; }
    .result-sub  { padding: 4px 18px 14px; font-size: 0.72rem; color: var(--muted); font-family: 'Space Mono', monospace; }
    .edit-row { padding: 0 18px 16px; display: flex; gap: 10px; }
    .edit-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.9rem; padding: 11px 14px; outline: none; transition: border-color 0.2s; }
    .edit-input:focus { border-color: var(--accent2); }
    .save-btn { background: var(--accent); color: #0a0c10; border: none; border-radius: 10px; padding: 11px 22px; font-family: 'Space Mono', monospace; font-size: 0.82rem; font-weight: 700; cursor: pointer; white-space: nowrap; }
    .save-btn:hover { opacity: 0.85; }

    .manual-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
    .lbl { font-size: 0.7rem; font-family: 'Space Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
    .manual-row { display: flex; gap: 10px; }
    .manual-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.85rem; padding: 11px 14px; outline: none; transition: border-color 0.2s; }
    .manual-row input:focus { border-color: var(--accent2); }
    .manual-row input::placeholder { color: var(--muted); }
    .send-btn { background: var(--accent2); color: #fff; border: none; border-radius: 10px; padding: 11px 18px; font-family: 'Space Mono', monospace; font-size: 0.82rem; font-weight: 700; cursor: pointer; }

    .log-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .log-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .log-title { font-size: 0.7rem; font-family: 'Space Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .log-count { font-size: 0.7rem; font-family: 'Space Mono', monospace; color: var(--accent); }
    .log-list  { padding: 8px 0; max-height: 200px; overflow-y: auto; }
    .log-empty { padding: 24px 18px; text-align: center; color: var(--muted); font-size: 0.8rem; font-family: 'Space Mono', monospace; }
    .log-item  { padding: 10px 18px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
    .log-item:last-child { border-bottom: none; }
    .log-icon  { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.75rem; }
    .log-icon.ok  { background: rgba(0,229,160,0.12); color: var(--accent); }
    .log-icon.err { background: rgba(255,76,76,0.12);  color: var(--warn); }
    .log-code { flex: 1; font-family: 'Space Mono', monospace; font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .log-time { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); white-space: nowrap; }
    .log-list::-webkit-scrollbar { width: 4px; }
    .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-90px); z-index: 200; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 10px 22px; font-size: 0.82rem; font-family: 'Space Mono', monospace; white-space: nowrap; transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1); max-width: 90vw; text-align: center; }
    .toast.show    { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--accent); color: var(--accent); }
    .toast.error   { border-color: var(--warn);   color: var(--warn); }
    .toast.info    { border-color: var(--accent2); color: var(--accent2); }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">Scann<span>App</span></div>
    <div class="pill"><div class="dot"></div><span id="engineStatus">LOADING…</span></div>
  </header>

  <div class="card">
    <div class="card-head">Take photo → Read Text → Save</div>
    <div class="preview-wrap">
      <img id="preview" alt="preview" />
      <div class="preview-placeholder" id="placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        Tap TAKE PHOTO below
      </div>
      <div class="crop-hint"><div class="crop-hint-label">TEXT READ ZONE</div></div>
    </div>
    <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="status-bar" id="statusBar">Loading OCR engine…</div>
    <div class="btn-row">
      <button class="btn-photo btn-take" id="btnTake" onclick="document.getElementById('fileCamera').click()">TAKE PHOTO</button>
      <button class="btn-photo btn-ocr"  id="btnOcr"  onclick="runOCR()" disabled>READ TEXT</button>
    </div>
  </div>

  <input type="file" id="fileCamera" accept="image/*" capture="environment" onchange="photoSelected(event)" />

  <div class="result-card" id="resultCard">
    <div class="result-head">✓ Text detected — confirm &amp; save</div>
    <div class="result-text" id="resultText"></div>
    <div class="result-sub">Edit if any character looks wrong, then tap SAVE</div>
    <div class="edit-row">
      <input class="edit-input" id="editInput" type="text" />
      <button class="save-btn" onclick="saveCode()">SAVE</button>
    </div>
  </div>

  <div class="manual-card">
    <div class="lbl">Manual Entry</div>
    <div class="manual-row">
      <input type="text" id="manualInput" placeholder="Type code manually…" />
      <button class="send-btn" onclick="submitManual()">SEND</button>
    </div>
  </div>

  <div class="log-card">
    <div class="log-head">
      <div class="log-title">Session Log</div>
      <div class="log-count" id="logCount">0 scans</div>
    </div>
    <div class="log-list" id="logList"><div class="log-empty">No scans yet</div></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<!-- Tesseract v4 — do NOT change this version, the API below depends on it -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwKCsS9xLd-AFr1K4nM7mJIdwGqe4mvRqsuoWrOnKlrdYDmWyLRU6YJqtlXJey_w0R8Xw/exec";

  let currentImage = null;
  let scanCount    = 0;
  let worker       = null;
  let workerReady  = false;

  // ── Init Tesseract v4 (correct API) ───────────────────────────────────────
  // v4 uses createWorker('lang') — NOT loadLanguage/initialize separately
  async function initWorker() {
    try {
      setStatus('Loading OCR engine…', 'active');

      worker = await Tesseract.createWorker('eng', 1, {
        // Tesseract v4 logger
        logger: m => {
          if (m.status === 'recognizing text') {
            const pct = Math.round((m.progress || 0) * 100);
            setProgress(pct);
            setStatus('Reading… ' + pct + '%', 'active');
          }
          if (m.status === 'initialized api') {
            // engine fully ready
          }
        }
      });

      // v4 setParameters API
      await worker.setParameters({
        // Whitelist: digits, lowercase c (your prefix), common alphanumeric
        tessedit_char_whitelist: '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ',
        // PSM 6 = assume uniform block of text (better than 7 for labels)
        tessedit_pageseg_mode: '6',
      });

      workerReady = true;
      document.getElementById('engineStatus').textContent = 'OCR READY';
      setStatus('Ready — tap Take Photo');

    } catch (err) {
      console.error('Tesseract init failed:', err);
      document.getElementById('engineStatus').textContent = 'OCR FAILED';
      setStatus('OCR failed to load — use manual entry', 'bad');
    }
  }
  initWorker();

  // ── Photo selected ────────────────────────────────────────────────────────
  function photoSelected(e) {
    const file = e.target.files[0];
    if (!file) return;
    currentImage = file;

    const url     = URL.createObjectURL(file);
    const preview = document.getElementById('preview');
    preview.src   = url;
    preview.style.display = 'block';
    preview.classList.add('loaded');
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('btnOcr').disabled = !workerReady;
    setStatus('Photo ready — tap Read Text', 'ok');
    document.getElementById('resultCard').classList.remove('show');
    e.target.value = '';
  }

  // ── OCR ───────────────────────────────────────────────────────────────────
  async function runOCR() {
    if (!currentImage)  { showToast('Take a photo first', 'info');              return; }
    if (!workerReady)   { showToast('OCR still loading — wait a moment', 'info'); return; }

    const btnOcr  = document.getElementById('btnOcr');
    const btnTake = document.getElementById('btnTake');
    btnOcr.disabled = btnTake.disabled = true;
    btnOcr.textContent = 'READING…';
    showProgress(true);
    setStatus('Preparing image…', 'active');

    try {
      // Pass 1: crop bottom 45% (text zone), greyscale only — gentle processing
      const img1   = await cropAndProcess(currentImage, 0.55, false);
      setStatus('Running OCR pass 1…', 'active');
      const res1   = await worker.recognize(img1);
      const code1  = extractCode(res1.data.text);
      console.log('Pass 1 raw:', res1.data.text, '→ extracted:', code1);

      if (code1 && code1.length >= 6) {
        finish(code1);
        return;
      }

      // Pass 2: same crop but with binarise (high contrast)
      setStatus('Pass 1 unclear — trying high contrast…', 'active');
      const img2  = await cropAndProcess(currentImage, 0.55, true);
      const res2  = await worker.recognize(img2);
      const code2 = extractCode(res2.data.text);
      console.log('Pass 2 raw:', res2.data.text, '→ extracted:', code2);

      if (code2 && code2.length >= 6) {
        finish(code2);
        return;
      }

      // Pass 3: whole image, no crop — maybe label fills the frame
      setStatus('Trying full image…', 'active');
      const img3  = await cropAndProcess(currentImage, 0, false);
      const res3  = await worker.recognize(img3);
      const code3 = extractCode(res3.data.text);
      console.log('Pass 3 raw:', res3.data.text, '→ extracted:', code3);

      if (code3 && code3.length >= 4) {
        finish(code3);
      } else {
        showProgress(false);
        setStatus('Could not read text — edit manually below', 'bad');
        showToast('Nothing found — type it manually', 'error');
        // Show result card pre-filled empty for easy manual correction
        showResult('');
      }

    } catch (err) {
      showProgress(false);
      setStatus('Error — ' + err.message, 'bad');
      console.error(err);
    }

    btnOcr.disabled = btnTake.disabled = false;
    btnOcr.textContent = 'READ TEXT';
  }

  function finish(code) {
    showProgress(false);
    setStatus('✓ Found: ' + code, 'ok');
    showResult(code);
    if (navigator.vibrate) navigator.vibrate(100);
    document.getElementById('btnOcr').disabled  = false;
    document.getElementById('btnTake').disabled = false;
    document.getElementById('btnOcr').textContent = 'READ TEXT';
  }

  // ── Image preparation ─────────────────────────────────────────────────────
  // cropFromTop: 0 = full image, 0.55 = skip top 55% (barcode), keep bottom 45% (text)
  // binarise: false = greyscale only, true = black/white high contrast
  function cropAndProcess(file, cropFromTop, binarise) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const sw = img.width;
        const sh = img.height;

        // Source crop
        const sy = Math.floor(sh * cropFromTop);
        const sh2 = sh - sy;

        // Output: upscale 2× for sharper OCR, max 1600px wide
        const scale = Math.min(2, 1600 / sw);
        const dw = Math.floor(sw  * scale);
        const dh = Math.floor(sh2 * scale);

        const c   = document.createElement('canvas');
        c.width   = dw;
        c.height  = dh;
        const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, sy, sw, sh2, 0, 0, dw, dh);

        if (binarise) {
          // Adaptive threshold: use average brightness so it works in any lighting
          const id = ctx.getImageData(0, 0, dw, dh);
          const px = id.data;
          let sum = 0;
          for (let i = 0; i < px.length; i += 4) {
            sum += 0.299*px[i] + 0.587*px[i+1] + 0.114*px[i+2];
          }
          const avg = sum / (px.length / 4);
          const threshold = avg * 0.82; // text is darker than background
          for (let i = 0; i < px.length; i += 4) {
            const g = 0.299*px[i] + 0.587*px[i+1] + 0.114*px[i+2];
            const v = g > threshold ? 255 : 0;
            px[i] = px[i+1] = px[i+2] = v; px[i+3] = 255;
          }
          ctx.putImageData(id, 0, 0);
        } else {
          // Greyscale only — preserve shades, gentler for OCR
          const id = ctx.getImageData(0, 0, dw, dh);
          const px = id.data;
          for (let i = 0; i < px.length; i += 4) {
            const g = 0.299*px[i] + 0.587*px[i+1] + 0.114*px[i+2];
            px[i] = px[i+1] = px[i+2] = g;
          }
          ctx.putImageData(id, 0, 0);
        }

        c.toBlob(b => resolve(b), 'image/png');
      };
      img.src = URL.createObjectURL(file);
    });
  }

  // ── Extract serial number from raw OCR text ───────────────────────────────
  // Your codes look like: c20250915364
  // Strategy: find the token that is MOSTLY digits with optional letter prefix
  function extractCode(raw) {
    if (!raw || !raw.trim()) return '';

    // Split on whitespace and newlines to get individual tokens
    const tokens = raw.split(/[\s\n\r]+/).map(t =>
      t.replace(/[^a-zA-Z0-9]/g, '').trim()  // strip non-alphanumeric per token
    ).filter(t => t.length >= 4);

    // Score each token: reward digit-heavy tokens, penalise all-letter tokens
    let best = '';
    let bestScore = -1;
    for (const t of tokens) {
      const digits  = (t.match(/\d/g)   || []).length;
      const letters = (t.match(/[a-zA-Z]/g) || []).length;
      // A code like c20250915364 = 1 letter + 11 digits → score ≈ 11/(12) * 100 + 12 ≈ 103
      // A word like "LABEL" = 0 digits → score = 0 + 5 = 5
      const score = (digits / t.length) * 100 + t.length;
      if (score > bestScore && digits >= 4) {
        bestScore = score;
        best = t;
      }
    }
    return best;
  }

  // ── Result / save ─────────────────────────────────────────────────────────
  function showResult(code) {
    document.getElementById('resultText').textContent = code || '(nothing detected)';
    document.getElementById('editInput').value = code;
    const card = document.getElementById('resultCard');
    card.classList.add('show');
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 120);
  }

  function saveCode() {
    const val = document.getElementById('editInput').value.trim();
    if (!val) { showToast('Code is empty', 'info'); return; }
    sendToSheet(val);
    document.getElementById('resultCard').classList.remove('show');
  }

  // ── Manual entry ──────────────────────────────────────────────────────────
  function submitManual() {
    const inp = document.getElementById('manualInput');
    const val = inp.value.trim();
    if (!val) { showToast('Please enter a code', 'info'); return; }
    sendToSheet(val);
    inp.value = '';
  }
  document.getElementById('manualInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitManual();
  });

  // ── Google Sheets ─────────────────────────────────────────────────────────
  async function sendToSheet(code) {
    try {
      await fetch(SCRIPT_URL, {
        method : 'POST',
        mode   : 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ code }),
      });
      addLog(code, true);
      showToast('✓ Saved: ' + code, 'success');
    } catch (err) {
      addLog(code, false);
      showToast('✗ Network error', 'error');
    }
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function showProgress(on) {
    document.getElementById('progressWrap').style.display = on ? 'block' : 'none';
    if (!on) document.getElementById('progressBar').style.width = '0%';
  }
  function setProgress(pct) {
    document.getElementById('progressBar').style.width = pct + '%';
  }
  function setStatus(msg, type = '') {
    const el = document.getElementById('statusBar');
    el.className = 'status-bar ' + type;
    el.innerHTML = type === 'active' ? `<div class="spinner"></div>${msg}` : msg;
  }
  let toastTimer;
  function showToast(msg, type = 'info') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
  }
  function addLog(code, ok) {
    const list = document.getElementById('logList');
    const empty = list.querySelector('.log-empty');
    if (empty) empty.remove();
    scanCount++;
    document.getElementById('logCount').textContent = `${scanCount} scan${scanCount !== 1 ? 's' : ''}`;
    const ts = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    const item = document.createElement('div');
    item.className = 'log-item';
    item.innerHTML = `
      <div class="log-icon ${ok?'ok':'err'}">${ok?'✓':'✗'}</div>
      <div class="log-code">${escHtml(code)}</div>
      <div class="log-time">${ts}</div>`;
    list.prepend(item);
  }
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
